<!DOCTYPE html>
<html>
<head>
  <title>Texa Teirs</title>

  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .title {
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      margin-top: 25px;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 15px;
      position: relative;
    }

    .tab {
      background: #1f2937;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab:hover {
      background: #374151;
      transform: scale(1.05);
    }

    .tab.active {
      font-weight: bold;
    }

    .tabs .underline {
      position: absolute;
      bottom: -6px;
      height: 3px;
      background: #2563eb;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* SEARCH BAR */
    .search-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 6px;
    }

    .search-container input {
      background: #1f2937;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      outline: none;
    }

    .search-container button {
      background: #2563eb;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .search-container button:hover {
      background: #1d4ed8;
    }

    /* POPUPS */
    .popup {
      position: fixed;
      top: 70px;
      right: 20px;
      background: #1f2937;
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
      animation: fadeIn 0.2s ease;
    }

    .popup.error {
      background: #7f1d1d;
    }

    .hidden {
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* REGIONS */
    .regions-container {
      position: fixed;
      right: 20px;
      top: 120px;
    }

    .regions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .region {
      background: #1f2937;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }

    .region:hover {
      background: #374151;
      transform: scale(1.05);
    }

    .region.active {
      font-weight: bold;
    }

    .regions .underline {
      position: absolute;
      left: -6px;
      width: 3px;
      background: #2563eb;
      border-radius: 2px;
      transition: 0.3s;
    }

    .content {
      margin-top: 60px;
      text-align: center;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="title">Texa Teirs</div>

  <!-- SEARCH -->
  <div class="search-container">
    <input type="text" id="playerInput" placeholder="Search player..." />
    <button onclick="searchPlayer()">Go</button>
  </div>

  <!-- POPUPS -->
  <div id="searchingPopup" class="popup hidden">
    Searching Player...<br>
    <span id="searchingName"></span>
  </div>

  <div id="errorPopup" class="popup error hidden">
    <strong>Player Not Found</strong><br>
    Unable to find player by the name of <span id="errorName"></span>
  </div>

  <!-- GAMEMODES -->
  <div class="tabs" id="tabs">
    <div class="tab" onclick="switchMode('overall')">Overall</div>
    <div class="tab" onclick="switchMode('vanilla')">Vanilla</div>
    <div class="tab" onclick="switchMode('mace')">Mace</div>
    <div class="tab" onclick="switchMode('sword')">Sword</div>
    <div class="tab" onclick="switchMode('uhc')">UHC</div>
    <div class="tab" onclick="switchMode('smp')">SMP</div>
    <div class="tab" onclick="switchMode('axe')">Axe</div>
    <div class="tab" onclick="switchMode('pot')">Pot</div>
    <div class="tab" onclick="switchMode('nethpot')">NethOP</div>
  </div>

  <!-- REGIONS -->
  <div class="regions-container">
    <div class="regions" id="regions">
      <div class="region" onclick="setRegion('ALL')">ALL</div>
      <div class="region" onclick="setRegion('NA')">NA</div>
      <div class="region" onclick="setRegion('EU')">EU</div>
      <div class="region" onclick="setRegion('ASIA')">ASIA</div>
      <div class="region" onclick="setRegion('OCE')">OCE</div>
    </div>
  </div>

  <div class="content">
    <p>Tier system goes here...</p>
  </div>

<script>
  let currentMode = "overall";
  let currentRegion = "ALL";

  function switchMode(mode){
    currentMode = mode;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const active = [...document.querySelectorAll('.tab')]
      .find(t => t.innerText.toLowerCase() === mode);

    if(active){
      active.classList.add('active');

      const tabs = document.getElementById("tabs");
      let ul = tabs.querySelector(".underline");

      if(!ul){
        ul = document.createElement("div");
        ul.className = "underline";
        tabs.appendChild(ul);
      }

      ul.style.width = active.offsetWidth + "px";
      ul.style.left = active.offsetLeft + "px";
    }
  }

  function setRegion(region){
    currentRegion = region;

    document.querySelectorAll('.region').forEach(r => r.classList.remove('active'));
    const active = [...document.querySelectorAll('.region')]
      .find(r => r.innerText === region);

    if(active){
      active.classList.add('active');

      const regions = document.getElementById("regions");
      let ul = regions.querySelector(".underline");

      if(!ul){
        ul = document.createElement("div");
        ul.className = "underline";
        regions.appendChild(ul);
      }

      ul.style.height = active.offsetHeight + "px";
      ul.style.top = active.offsetTop + "px";
    }
  }

  // SEARCH (Mojang check → open NameMC)
  async function searchPlayer() {
    const username = document.getElementById("playerInput").value;
    if (!username) return;

    showSearching(username);

    try {
      const res = await fetch(`https://api.mojang.com/users/profiles/minecraft/${username}`);

      if (!res.ok) throw new Error();

      hideSearching();

      // Open NameMC profile
      window.open(`https://namemc.com/profile/${username}`, "_blank");

    } catch {
      hideSearching();
      showError(username);
    }
  }

  function showSearching(name){
    document.getElementById("searchingPopup").classList.remove("hidden");
    document.getElementById("searchingName").innerText = "Searching for " + name;
  }

  function hideSearching(){
    document.getElementById("searchingPopup").classList.add("hidden");
  }

  function showError(name){
    const popup = document.getElementById("errorPopup");
    document.getElementById("errorName").innerText = name;
    popup.classList.remove("hidden");

    setTimeout(() => {
      popup.classList.add("hidden");
    }, 3000);
  }

  // ENTER KEY SUPPORT
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("playerInput")
      .addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
          searchPlayer();
        }
      });

    switchMode('overall');
    setRegion('ALL');
  });
</script>

</body>
</html>
