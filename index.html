<!DOCTYPE html>
<html>
<head>
  <title>Texa Teirs</title>

  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .title {
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      margin-top: 25px;
    }

    .search-container {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 6px;
    }

    .search-container input {
      background: #1f2937;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
    }

    .search-container button {
      background: #2563eb;
      border: none;
      padding: 10px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .players {
      margin-top: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .player {
      background: #1f2937;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
    }

    .player:hover {
      background: #374151;
      transform: scale(1.05);
    }

    .player.top {
      border: 2px solid gold;
      box-shadow: 0 0 10px gold;
    }

    .player img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    .hidden { display: none; }

    /* SPINNER */
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #60a5fa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* RANKS */
    .rank { padding: 6px 12px; border-radius: 999px; margin-top: 10px; display: inline-block; }
    .rookie { background:#374151; }
    .immortal { background: linear-gradient(45deg,#facc15,#f97316); color:black; }

    /* TIERS */
    .tiers {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .tier {
      background: #1f2937;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

  </style>
</head>

<body>

<div class="title">Texa Teirs</div>

<div class="search-container">
  <input type="text" id="playerInput" placeholder="Search player..." />
  <button onclick="searchPlayer()">Search</button>
</div>

<div class="players" id="players"></div>

<!-- MODAL -->
<div id="modal" class="modal-backdrop hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modalContent"></div>
  </div>
</div>

<script>

/* ✅ UPDATED PLAYER DATA */
const players = [
  {
    name: "nottexa",
    rank: "Immortal Demon",
    class: "immortal",
    position: 1,
    tiers: [
      "Vanilla LT3",
      "Sword LT4",
      "UHC LT4",
      "Axe LT4",
      "Mace LT4",
      "SMP LT4",
      "Pot LT4",
      "NethOP LT4"
    ]
  },
  {
    name:"Demonmcc",
    rank:"Immortal Demon",
    class:"immortal",
    position:1096,
    tiers:["HT2","LT3","HT5"]
  },
  {
    name:"NoobPvP",
    rank:"Rookie",
    class:"rookie",
    position:9999,
    tiers:["LT1"]
  }
];

function getHead(username){
  return `https://mc-heads.net/avatar/${username}`;
}

function renderPlayers(){
  const container = document.getElementById("players");
  container.innerHTML = "";

  players.forEach(p=>{
    const div = document.createElement("div");
    div.className = "player" + (p.position === 1 ? " top" : "");

    div.innerHTML = `
      <img src="${getHead(p.name)}">
      #${p.position} ${p.name}
    `;

    div.onclick = () => openProfile(p);
    container.appendChild(div);
  });
}

function openProfile(player){
  document.getElementById("modal").classList.remove("hidden");

  const content = document.getElementById("modalContent");
  content.innerHTML = `<div class="spinner"></div>`;

  setTimeout(()=>{
    content.innerHTML = `
      <img src="${getHead(player.name)}" style="width:64px;border-radius:8px;">
      <h2>${player.name}</h2>
      <div class="rank ${player.class}">${player.rank}</div>
      <p>🏆 Position: #${player.position}</p>

      <div class="tiers">
        ${player.tiers.map(t => `<div class="tier">${t}</div>`).join("")}
      </div>
    `;
  }, 500);
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

/* SEARCH */
function searchPlayer(){
  const name = document.getElementById("playerInput").value;
  if(!name) return;

  openProfile({
    name: name,
    rank: "Rookie",
    class: "rookie",
    position: "Unranked",
    tiers: ["N/A"]
  });
}

document.addEventListener("DOMContentLoaded", renderPlayers);

</script>

</body>
</html>
