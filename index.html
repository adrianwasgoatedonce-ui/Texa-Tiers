<!DOCTYPE html>
<html>
<head>
  <title>Texa Teirs</title>

  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .title {
      text-align: center;
      font-size: 42px;
      font-weight: bold;
      margin-top: 25px;
    }

    /* ===== TABS (ICON STYLE) ===== */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .tab {
      background: #1f2937;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      width: 60px;
      transition: 0.2s;
    }

    .tab:hover {
      background: #374151;
    }

    .tab.active {
      outline: 2px solid #2563eb;
    }

    .tab img {
      width: 26px;
      height: 26px;
      display: block;
      margin: auto;
    }

    .tab span {
      font-size: 11px;
      display: block;
      margin-top: 4px;
    }

    /* ===== REGIONS ===== */
    .regions-container {
      position: fixed;
      left: 20px;
      top: 120px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .region {
      background: #1f2937;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      width: 60px;
    }

    .region.active {
      outline: 2px solid #2563eb;
    }

    /* ===== CONTENT ===== */
    .content {
      margin-top: 60px;
      margin-left: 100px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    /* ===== LEADERBOARD ===== */
    .leaderboard-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #111827;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .leaderboard-row:hover {
      background: #1f2937;
    }

    .lb-rank {
      font-weight: bold;
      color: gold;
      width: 40px;
    }

    .lb-head {
      width: 40px;
      height: 40px;
      border-radius: 6px;
    }

    .lb-name {
      font-weight: bold;
    }

    .lb-tier {
      font-size: 12px;
      color: #9ca3af;
    }

    /* ===== TIERS ===== */
    .tier {
      background: #1f2937;
      padding: 12px;
      border-radius: 10px;
      min-width: 180px;
    }

    .tier strong {
      display: block;
      margin-bottom: 8px;
      border-bottom: 1px solid #2563eb;
    }

    .player.compact {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      cursor: pointer;
    }

    .mini-head {
      width: 20px;
      height: 20px;
    }

    /* ===== MODAL ===== */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
    }

    .hidden { display: none; }

    /* ===== SLOT SYSTEM ===== */
    .slots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .slot {
      background: #0f172a;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }

    .slot img {
      width: 28px;
      height: 28px;
    }

    .slot span {
      display: block;
      font-size: 11px;
      margin-top: 4px;
      color: #fbbf24;
    }
  </style>
</head>

<body>

<div class="title">Texa Teirs</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchMode('overall')"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png"><span>All</span></div>
  <div class="tab" onclick="switchMode('vanilla')"><img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png"><span>Vanilla</span></div>
  <div class="tab" onclick="switchMode('sword')"><img src="https://cdn-icons-png.flaticon.com/512/833/833472.png"><span>Sword</span></div>
  <div class="tab" onclick="switchMode('uhc')"><img src="https://cdn-icons-png.flaticon.com/512/3176/3176290.png"><span>UHC</span></div>
</div>

<!-- REGIONS -->
<div class="regions-container">
  <div class="region active" onclick="setRegion('ALL')">ALL</div>
  <div class="region" onclick="setRegion('NA')">NA</div>
  <div class="region" onclick="setRegion('EU')">EU</div>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- MODAL -->
<div id="modal" class="modal-bg hidden" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modalContent"></div>
  </div>
</div>

<script>
let currentMode = "overall";

const playerData = {
  overall: {
    "Immortal Demon": ["nottexa"],
    "Mid": ["Demonmcc"]
  },
  vanilla: {
    "Tier 1": ["K1RBE"],
    "Tier 2": ["Camcal", "Demonmcc"]
  }
};

/* SLOT DATA (example like HT2 LT3 etc) */
const slotData = {
  "nottexa": [
    {icon:"❤️", tier:"HT2"},
    {icon:"⚔️", tier:"HT1"},
    {icon:"🧪", tier:"LT3"}
  ]
};

function renderContent() {
  const container = document.getElementById("content");
  container.innerHTML = "";

  const data = playerData[currentMode];

  if (currentMode === "overall") {
    let rank = 1;
    for (const tier in data) {
      data[tier].forEach(player => {
        const row = document.createElement("div");
        row.className = "leaderboard-row";
        row.innerHTML = `
          <div class="lb-rank">#${rank}</div>
          <img class="lb-head" src="https://mc-heads.net/avatar/${player}">
          <div>
            <div class="lb-name">${player}</div>
            <div class="lb-tier">${tier}</div>
          </div>
        `;
        row.onclick = () => openModal(player);
        container.appendChild(row);
        rank++;
      });
    }
    return;
  }

  for (const tier in data) {
    const div = document.createElement("div");
    div.className = "tier";
    div.innerHTML = `<strong>${tier}</strong>`;

    data[tier].forEach(player => {
      const p = document.createElement("div");
      p.className = "player compact";
      p.innerHTML = `
        <img class="mini-head" src="https://mc-heads.net/avatar/${player}">
        ${player}
      `;
      p.onclick = () => openModal(player);
      div.appendChild(p);
    });

    container.appendChild(div);
  }
}

function openModal(player) {
  const modal = document.getElementById("modal");
  modal.classList.remove("hidden");

  const slots = slotData[player] || [];

  let slotsHTML = "";

  for (let i = 0; i < 8; i++) {
    if (slots[i]) {
      slotsHTML += `
        <div class="slot">
          <div>${slots[i].icon}</div>
          <span>${slots[i].tier}</span>
        </div>
      `;
    } else {
      slotsHTML += `<div class="slot"></div>`;
    }
  }

  document.getElementById("modalContent").innerHTML = `
    <h2>${player}</h2>
    <div class="slots">${slotsHTML}</div>
  `;
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

function switchMode(mode) {
  currentMode = mode;
  renderContent();
}

function setRegion() {}

renderContent();
</script>

</body>
</html>
