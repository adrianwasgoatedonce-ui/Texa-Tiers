<!DOCTYPE html>
<html>
<head>
  <title>Texa Teirs</title>

  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      margin: 0;
      text-align: center;
    }

    /* TITLE */
    .title {
      font-size: 40px;
      font-weight: bold;
      margin-top: 25px;
    }

    /* TABS */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 15px;
      position: relative;
    }

    .tab {
      background: #1f2937;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab:hover {
      background: #374151;
      transform: scale(1.05);
    }

    .tab.active {
      font-weight: bold;
    }

    .underline {
      position: absolute;
      bottom: -5px;
      height: 3px;
      background: #2563eb;
      border-radius: 2px;
      transition: 0.3s;
    }

    /* REGIONS */
    .regions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
    }

    .region {
      background: #1f2937;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .region:hover {
      background: #374151;
    }

    .region.active {
      background: #2563eb;
    }

    /* PLACEHOLDER AREA */
    .content {
      margin-top: 40px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <!-- TITLE -->
  <div class="title">Texa Teirs</div>

  <!-- MODES -->
  <div class="tabs" id="tabs">
    <div class="tab" onclick="switchMode('overall')">Overall</div>
    <div class="tab" onclick="switchMode('vanilla')">Vanilla</div>
    <div class="tab" onclick="switchMode('mace')">Mace</div>
    <div class="tab" onclick="switchMode('sword')">Sword</div>
    <div class="tab" onclick="switchMode('uhc')">UHC</div>
    <div class="tab" onclick="switchMode('smp')">SMP</div>
    <div class="tab" onclick="switchMode('axe')">Axe</div>
    <div class="tab" onclick="switchMode('pot')">Pot</div>
    <div class="tab" onclick="switchMode('nethpot')">NethOP</div>
  </div>

  <!-- REGIONS -->
  <div class="regions">
    <div class="region" onclick="setRegion('ALL')">ALL</div>
    <div class="region" onclick="setRegion('NA')">NA</div>
    <div class="region" onclick="setRegion('EU')">EU</div>
    <div class="region" onclick="setRegion('ASIA')">ASIA</div>
    <div class="region" onclick="setRegion('OCE')">OCE</div>
  </div>

  <!-- EMPTY CONTENT (for later tiers UI) -->
  <div class="content">
    <p>Tier lists will go here...</p>
  </div>

<script>
  let currentMode = "overall";
  let currentRegion = "ALL";

  function switchMode(mode){
    currentMode = mode;

    document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
    const activeTab = Array.from(document.querySelectorAll('.tab'))
      .find(tab => tab.innerText.toLowerCase() === mode);

    if(activeTab){
      activeTab.classList.add('active');

      const tabs = document.getElementById("tabs");
      let ul = tabs.querySelector(".underline");

      if(!ul){
        ul = document.createElement("div");
        ul.className = "underline";
        tabs.appendChild(ul);
      }

      ul.style.width = activeTab.offsetWidth + "px";
      ul.style.left = activeTab.offsetLeft + "px";
    }
  }

  function setRegion(region){
    currentRegion = region;

    document.querySelectorAll('.region').forEach(r => r.classList.remove('active'));
    const active = Array.from(document.querySelectorAll('.region'))
      .find(r => r.innerText === region);

    if(active) active.classList.add('active');
  }

  // init
  window.onload = () => {
    switchMode('overall');
    setRegion('ALL');
  }
</script>

</body>
</html>
