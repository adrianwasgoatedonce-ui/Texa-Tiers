<!DOCTYPE html>
<html>
<head>
  <title>Texa Tiers</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body {
      background: #0b0f1a;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: #111827;
      align-items: center;
    }

    h1 { margin: 0; }

    #search {
      padding: 8px;
      border-radius: 6px;
      border: none;
      width: 180px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      padding: 10px 30px;
    }

    .tab {
      background: #1f2937;
      padding: 8px 15px;
      cursor: pointer;
      border-radius: 6px;
    }

    .players {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
      position: relative;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .top1 { box-shadow: 0 0 20px gold; }
    .top2 { box-shadow: 0 0 20px silver; }
    .top3 { box-shadow: 0 0 20px #cd7f32; }

    .crown {
      position: absolute;
      top: 5px;
      right: 8px;
      font-size: 18px;
    }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111827;
      padding: 25px;
      border-radius: 12px;
      display: none;
      width: 300px;
    }

    .popup h2 { margin-top: 0; }

    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      top: 0;
      left: 0;
      display: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Texa Tiers</h1>
  <input id="search" placeholder="Search player...">
</header>

<div class="tabs">
  <div class="tab" onclick="switchMode('overall')">Overall</div>
  <div class="tab" onclick="switchMode('sword')">Sword</div>
  <div class="tab" onclick="switchMode('mace')">Mace</div>
</div>

<div class="players" id="players"></div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
  <h2 id="pName"></h2>
  <p id="pRegion"></p>
  <div id="pTiers"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBXnW2iX1BvbsrnX8t5XKYlPWVaJTplG4A",
  authDomain: "texa-tier-list.firebaseapp.com",
  projectId: "texa-tier-list"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentMode = "overall";

function switchMode(mode) {
  currentMode = mode;
  loadPlayers();
}

async function loadPlayers() {
  const container = document.getElementById("players");
  container.innerHTML = "";

  const snapshot = await db.collection("players").get();

  let players = [];

  snapshot.forEach(doc => {
    const data = doc.data();

    if (data.tiers && data.tiers[currentMode]) {
      players.push(data);
    }
  });

  players.sort((a, b) => (b.tiers.overall || "").localeCompare(a.tiers.overall || ""));

  players.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "card";

    if (i === 0) div.classList.add("top1");
    if (i === 1) div.classList.add("top2");
    if (i === 2) div.classList.add("top3");

    div.innerHTML = `
      ${i < 3 ? `<div class="crown">👑</div>` : ""}
      <h3>${p.name}</h3>
      <p>${p.tiers[currentMode]}</p>
    `;

    div.onclick = () => openPopup(p);

    container.appendChild(div);
  });
}

function openPopup(p) {
  document.getElementById("overlay").style.display = "block";
  document.getElementById("popup").style.display = "block";

  document.getElementById("pName").innerText = p.name;
  document.getElementById("pRegion").innerText = "Region: " + (p.region || "N/A");

  let html = "";

  for (let key in p.tiers) {
    if (p.tiers[key]) {
      html += `<p>${key.toUpperCase()}: ${p.tiers[key]}</p>`;
    }
  }

  document.getElementById("pTiers").innerHTML = html;
}

function closePopup() {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("popup").style.display = "none";
}

document.getElementById("search").addEventListener("keypress", async function(e) {
  if (e.key === "Enter") {
    const value = this.value;

    document.getElementById("popup").style.display = "block";
    document.getElementById("overlay").style.display = "block";

    document.getElementById("pName").innerText = "Searching...";
    document.getElementById("pRegion").innerText = "";
    document.getElementById("pTiers").innerHTML = "";

    const snap = await db.collection("players").where("name","==",value).get();

    if (snap.empty) {
      document.getElementById("pName").innerText = value;
      document.getElementById("pRegion").innerText = "Player Not Found ❌";
      return;
    }

    const p = snap.docs[0].data();
    openPopup(p);
  }
});

loadPlayers();
</script>

</body>
</html>
