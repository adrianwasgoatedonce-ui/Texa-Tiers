<!DOCTYPE html>
<html>
<head>
  <title>Texa Tier List</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px;
    }

    .tab {
      padding: 10px 15px;
      background: #1f2937;
      border-radius: 8px;
      cursor: pointer;
    }

    .tab.active {
      background: #2563eb;
    }

    #list {
      max-width: 500px;
      margin: auto;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      margin: 5px 0;
      border-radius: 8px;
      cursor: pointer;
    }

    .ht {
      background: #1d4ed8;
    }

    .lt {
      background: #374151;
    }

    .row-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .head {
      width: 30px;
      border-radius: 5px;
    }

    .admin {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      margin: 20px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>⚔️ Texa Tier List</h1>

<!-- ADMIN PANEL -->
<div class="admin">
  <h3>Admin Panel</h3>

  <input id="nameInput" placeholder="Player Name">

  <select id="modeInput">
    <option>Overall</option>
    <option>Vanilla</option>
    <option>UHC</option>
    <option>Sword</option>
    <option>Axe</option>
  </select>

  <select id="tierInput">
    <option>HT1</option><option>LT1</option>
    <option>HT2</option><option>LT2</option>
    <option>HT3</option><option>LT3</option>
    <option>HT4</option><option>LT4</option>
  </select>

  <button onclick="addPlayer()">Add Player</button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchMode('Overall', this)">Overall</div>
  <div class="tab" onclick="switchMode('Vanilla', this)">Vanilla</div>
  <div class="tab" onclick="switchMode('UHC', this)">UHC</div>
  <div class="tab" onclick="switchMode('Sword', this)">Sword</div>
  <div class="tab" onclick="switchMode('Axe', this)">Axe</div>
</div>

<div id="list"></div>

<script type="module">

// 🔥 FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔥 YOUR CONFIG (PASTE YOURS HERE)
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 DATABASE
let database = {
  Overall: {},
  Vanilla: {},
  UHC: {},
  Sword: {},
  Axe: {}
};

// 🔥 TIER ORDER
const tierOrder = [
  "HT1","LT1",
  "HT2","LT2",
  "HT3","LT3",
  "HT4","LT4"
];

// 🔥 ADD PLAYER
async function addPlayer() {
  const name = document.getElementById("nameInput").value.trim();
  const mode = document.getElementById("modeInput").value;
  const tier = document.getElementById("tierInput").value;

  if (!name) return;

  await addDoc(collection(db, "tiers"), {
    name,
    mode,
    tier
  });

  loadData();
}

// 🔥 LOAD DATA
async function loadData() {
  database = {
    Overall: {},
    Vanilla: {},
    UHC: {},
    Sword: {},
    Axe: {}
  };

  const snapshot = await getDocs(collection(db, "tiers"));

  snapshot.forEach(doc => {
    const data = doc.data();

    if (!database[data.mode][data.tier]) {
      database[data.mode][data.tier] = [];
    }

    database[data.mode][data.tier].push(data.name);
  });

  render(currentMode);
}

// 🔥 RENDER
let currentMode = "Overall";

function render(mode) {
  const container = document.getElementById("list");
  container.innerHTML = "";

  const tiers = database[mode] || {};

  const sorted = Object.keys(tiers).sort(
    (a, b) => tierOrder.indexOf(a) - tierOrder.indexOf(b)
  );

  sorted.forEach(tier => {
    const isHT = tier.startsWith("HT");

    let title = document.createElement("div");
    title.innerText = tier;
    title.style.marginTop = "10px";
    title.style.fontWeight = "bold";

    container.appendChild(title);

    tiers[tier].sort().forEach(player => {
      container.appendChild(makeRow(player, isHT ? "ht" : "lt"));
    });
  });
}

// 🔥 PLAYER ROW
function makeRow(player, type) {
  let row = document.createElement("div");
  row.className = "row " + type;

  row.innerHTML = `
    <div class="row-left">
      <img class="head" src="https://mc-heads.net/avatar/${player}">
      ${player}
    </div>
    <div>⇅</div>
  `;

  return row;
}

// 🔥 SWITCH TAB
function switchMode(mode, el) {
  currentMode = mode;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");

  render(mode);
}

// 🔥 INIT
loadData();

</script>

</body>
</html>
