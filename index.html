<!DOCTYPE html>
<html>
<head>
  <title>Texa Tier List</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 25px;
      background: #0f172a;
      border-bottom: 1px solid #1f2937;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #facc15;
    }

    /* GAMEMODE TABS */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 10px 15px;
      background: #111827;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab:hover {
      background: #1f2937;
    }

    .active {
      background: #374151;
    }

    /* TIERS */
    #tiers {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .tier {
      width: 220px;
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
    }

    .tier-title {
      padding: 12px;
      font-weight: bold;
      text-align: center;
    }

    .t1 { background: #facc15; color: black; }
    .t2 { background: #9ca3af; }
    .t3 { background: #92400e; }
    .t4 { background: #1f2937; }
    .t5 { background: #111827; }

    /* PLAYER ROW */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      border-bottom: 1px solid #0b1220;
    }

    .row-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .head {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .ht { background: #1f2937; }
    .lt { background: #111827; }

    .arrow {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">⚔️ Texa Tier List</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchMode('Vanilla', this)">Vanilla</div>
  <div class="tab" onclick="switchMode('UHC', this)">UHC</div>
  <div class="tab" onclick="switchMode('Sword', this)">Sword</div>
  <div class="tab" onclick="switchMode('Axe', this)">Axe</div>
</div>

<!-- TIERS -->
<div id="tiers"></div>

<script>
const data = {
  Vanilla: {
    "Tier 1": { HT: ["K1RBE"], LT: [] },
    "Tier 2": {
      HT: ["Camcal","Demonmcc","KingD3fault","qPower","Tokenu","cloudmlol","Cowarted"],
      LT: ["IRONSKKEGOXX7153","ItzEggman","GalleryWalk"]
    },
    "Tier 3": {
      HT: ["jayckuuub","ItzTerrel"],
      LT: ["thelastw1nter","isolation"]
    },
    "Tier 4": { HT: ["trayde_"], LT: ["8amnNoticeMe"] },
    "Tier 5": { HT: ["barbarthecrafter"], LT: [] }
  },

  UHC: {
    "Tier 1": { HT: ["Player1"], LT: [] },
    "Tier 2": { HT: ["Player2"], LT: ["Player3"] },
    "Tier 3": { HT: [], LT: [] },
    "Tier 4": { HT: [], LT: [] },
    "Tier 5": { HT: [], LT: [] }
  },

  Sword: {
    "Tier 1": { HT: ["SwordGod"], LT: [] },
    "Tier 2": { HT: [], LT: [] },
    "Tier 3": { HT: [], LT: [] },
    "Tier 4": { HT: [], LT: [] },
    "Tier 5": { HT: [], LT: [] }
  },

  Axe: {
    "Tier 1": { HT: ["AxePro"], LT: [] },
    "Tier 2": { HT: [], LT: [] },
    "Tier 3": { HT: [], LT: [] },
    "Tier 4": { HT: [], LT: [] },
    "Tier 5": { HT: [], LT: [] }
  }
};

function getHead(name) {
  return `https://mc-heads.net/avatar/${name}`;
}

function render(mode) {
  const container = document.getElementById("tiers");
  container.innerHTML = "";

  let i = 1;

  for (let tier in data[mode]) {
    let box = document.createElement("div");
    box.className = "tier";

    let title = document.createElement("div");
    title.className = "tier-title t" + i;
    title.innerText = tier;
    box.appendChild(title);

    // HT
    data[mode][tier].HT.forEach(p => {
      box.appendChild(makeRow(p, "ht"));
    });

    // LT
    data[mode][tier].LT.forEach(p => {
      box.appendChild(makeRow(p, "lt"));
    });

    container.appendChild(box);
    i++;
  }
}

function makeRow(player, type) {
  let row = document.createElement("div");
  row.className = "row " + type;

  row.innerHTML = `
    <div class="row-left">
      <img class="head" src="${getHead(player)}">
      ${player}
    </div>
    <div class="arrow">⇅</div>
  `;

  return row;
}

function switchMode(mode, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  render(mode);
}

// default
render("Vanilla");
</script>

</body>
</html>
