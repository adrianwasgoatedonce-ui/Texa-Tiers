<!DOCTYPE html>
<html>
<head>
  <title>Texa Tier List</title>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tabs button {
      background: #1f2937;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    .tabs button.active {
      background: #3b82f6;
    }

    #search {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: #111827;
      color: white;
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 5px;
      transition: 0.2s;
      cursor: pointer;
    }

    .row:hover {
      transform: scale(1.02);
      background: #1f2937;
    }

    .row-left {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .head {
      width: 25px;
      border-radius: 5px;
    }

    .ht { background: rgba(34,197,94,0.15); }
    .lt { background: rgba(239,68,68,0.15); }

    .top1 { box-shadow: 0 0 15px gold; }
    .top2 { box-shadow: 0 0 12px silver; }
    .top3 { box-shadow: 0 0 12px #cd7f32; }

    /* popup */
    .popup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .popup-card {
      background: #0f172a;
      padding: 20px;
      border-radius: 12px;
      width: 300px;
    }

    .tier-box {
      background: #1f2937;
      padding: 5px;
      margin: 3px;
      border-radius: 6px;
      font-size: 12px;
    }

  </style>
</head>

<body>

<div class="header">
  <h1>Texa Tier List</h1>
</div>

<input id="search" placeholder="Search player..." oninput="render(currentMode)">

<div class="tabs">
  <button onclick="switchMode('Overall', this)" class="active">Overall</button>
  <button onclick="switchMode('Vanilla', this)">Vanilla</button>
  <button onclick="switchMode('Sword', this)">Sword</button>
  <button onclick="switchMode('UHC', this)">UHC</button>
  <button onclick="switchMode('Axe', this)">Axe</button>
  <button onclick="switchMode('Nethop', this)">Nethop</button>
  <button onclick="switchMode('Pot', this)">Pot</button>
  <button onclick="switchMode('SMP', this)">SMP</button>
  <button onclick="switchMode('Mace', this)">Mace</button>
</div>

<div id="list"></div>

<!-- popup -->
<div id="popup" class="popup" onclick="closePopup()">
  <div class="popup-card" onclick="event.stopPropagation()">
    <h2 id="pname"></h2>
    <img id="phead">
    <div id="ppoints"></div>
    <div id="prank"></div>
    <div id="ptiers"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let players = [];
let currentMode = "Overall";

const tierPoints = {
  HT1: 100, LT1: 90,
  HT2: 80, LT2: 70,
  HT3: 60, LT3: 50,
  HT4: 40, LT4: 30
};

function getRank(points) {
  if (points >= 300) return { name: "Immortal", color: "red" };
  if (points >= 250) return { name: "Elite Champion", color: "purple" };
  if (points >= 200) return { name: "Master", color: "blue" };
  if (points >= 150) return { name: "Advanced", color: "green" };
  if (points >= 100) return { name: "Skilled", color: "gold" };
  return { name: "Beginner", color: "gray" };
}

async function loadData() {
  players = [];

  const snapshot = await getDocs(collection(db, "players"));

  snapshot.forEach(doc => {
    let p = doc.data();
    let points = 0;

    for (let m in p.tiers) {
      points += tierPoints[p.tiers[m]] || 0;
    }

    players.push({
      name: p.name,
      tiers: p.tiers,
      points
    });
  });

  render(currentMode);
}

function switchMode(mode, el) {
  currentMode = mode;

  document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
  if (el) el.classList.add("active");

  render(mode);
}

function render(mode) {
  const container = document.getElementById("list");
  container.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();

  if (mode === "Overall") {
    players.sort((a,b)=>b.points-a.points);

    players.forEach((p,i)=>{
      if (!p.name.toLowerCase().includes(search)) return;

      let crown = i===0?"👑":i===1?"🥈":i===2?"🥉":"";
      let extra = i===0?"top1":i===1?"top2":i===2?"top3":"";

      const rank = getRank(p.points);

      let row = document.createElement("div");
      row.className = "row ht " + extra;

      row.onclick = ()=>openPopup(p.name);

      row.innerHTML = `
        <div class="row-left">
          <b>${crown} #${i+1}</b>
          <img class="head" src="https://mc-heads.net/avatar/${p.name}">
          ${p.name}
        </div>
        <div>
          <span style="background:${rank.color};padding:3px 6px;border-radius:5px;font-size:11px;">
            ${rank.name}
          </span><br>
          ${p.points} pts
        </div>
      `;

      container.appendChild(row);
    });

    return;
  }
}

function openPopup(name){
  const p = players.find(x=>x.name===name);

  document.getElementById("popup").style.display="flex";
  document.getElementById("pname").innerText=p.name;
  document.getElementById("phead").src=`https://mc-heads.net/avatar/${p.name}`;
  document.getElementById("ppoints").innerText=p.points+" pts";

  const sorted=[...players].sort((a,b)=>b.points-a.points);
  const pos=sorted.findIndex(x=>x.name===name)+1;

  document.getElementById("prank").innerText="#"+pos;

  const box=document.getElementById("ptiers");
  box.innerHTML="";

  for(let m in p.tiers){
    let d=document.createElement("div");
    d.className="tier-box";
    d.innerText=m+": "+p.tiers[m];
    box.appendChild(d);
  }
}

window.closePopup=()=>document.getElementById("popup").style.display="none";

loadData();

</script>

</body>
</html>
